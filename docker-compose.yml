services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: best_cms
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d best_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: development
      # ⚠ local dev secrets only — never use production values here
      APP_KEYS: CHANGE_ME_key1,CHANGE_ME_key2,CHANGE_ME_key3,CHANGE_ME_key4
      API_TOKEN_SALT: CHANGE_ME
      ADMIN_JWT_SECRET: CHANGE_ME
      TRANSFER_TOKEN_SALT: CHANGE_ME
      ENCRYPTION_KEY: CHANGE_ME
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: best_cms
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      DATABASE_SSL: "false"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:4173"
    volumes:
      - ./backend/config:/opt/app/config:z
      - ./backend/src:/opt/app/src:z
      - ./backend/package.json:/opt/app/package.json:z
      - strapi_node_modules:/opt/app/node_modules
      - ./backend/public/uploads:/opt/app/public/uploads:z
    ports:
      - "1337:1337"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      VITE_STRAPI_URL: http://localhost:1337
    volumes:
      - ./frontend/src:/opt/app/src:z
      - ./frontend/public:/opt/app/public:z
      - ./frontend/index.html:/opt/app/index.html:z
      - ./frontend/vite.config.js:/opt/app/vite.config.js:z
      - ./frontend/package.json:/opt/app/package.json:z
      - frontend_node_modules:/opt/app/node_modules
    ports:
      - "5173:5173"

volumes:
  pg_data:
  strapi_node_modules:
  frontend_node_modules:
