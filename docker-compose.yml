services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: best_cms
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d best_cms"]
      interval: 5s
      timeout: 3s
      retries: 5

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ZnILwjtws4F+Pk7xcnO0TQ==,/W7NrXNuXfn4Pg8smLH51A==,6DHN3YefGSh+AoMIYelUtg==,97AQcA2Yw5psogJtSn8CPQ==
      API_TOKEN_SALT: m3sLAfhil0G7Kc6tUaAjZA==
      ADMIN_JWT_SECRET: PoEgE54wKnyNRd/Xb8dL1A==
      TRANSFER_TOKEN_SALT: eS6AzBbETrLdrBimnY1LOg==
      ENCRYPTION_KEY: xhvQ+KrRaGQticjpcw2LiQ==
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: best_cms
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      DATABASE_SSL: "false"
      NODE_ENV: development
    volumes:
      - ./backend/config:/opt/app/config:z
      - ./backend/src:/opt/app/src:z
      - ./backend/package.json:/opt/app/package.json:z
      - strapi_node_modules:/opt/app/node_modules
      - ./backend/public/uploads:/opt/app/public/uploads:z
    ports:
      - "1337:1337"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      VITE_STRAPI_URL: http://localhost:1337
    volumes:
      - ./frontend/src:/opt/app/src:z
      - ./frontend/public:/opt/app/public:z
      - ./frontend/index.html:/opt/app/index.html:z
      - ./frontend/vite.config.js:/opt/app/vite.config.js:z
      - ./frontend/package.json:/opt/app/package.json:z
      - frontend_node_modules:/opt/app/node_modules
    ports:
      - "5173:5173"

volumes:
  pg_data:
  strapi_node_modules:
  frontend_node_modules:
